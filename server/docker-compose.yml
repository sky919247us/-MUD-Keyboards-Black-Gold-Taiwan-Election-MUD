version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tw_mud_postgres
    restart: always
    environment:
      POSTGRES_USER: mud_user
      POSTGRES_PASSWORD: mud_password
      POSTGRES_DB: tw_mud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
